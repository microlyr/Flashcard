name: Build APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy HTML to assets
        run: |
          mkdir -p android/app/src/main/assets
          cp flashcard.html android/app/src/main/assets/flashcard.html

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Install Gradle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gradle

      - name: Build Release APK
        run: |
          cd android
          gradle :app:assembleRelease

      - name: Sign APK (debug keystore)
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found, checking debug..."
            APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          fi
          echo "APK found: $APK"
          cp "$APK" ai-flashcard.apk

          # Generate debug keystore for signing
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" \
            -noprompt 2>/dev/null || true

          # If an unsigned APK exists, sign it
          UNSIGNED=$(find android/app/build/outputs/apk/release -name "*-unsigned.apk" | head -1)
          if [ -n "$UNSIGNED" ]; then
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-pass pass:android "$UNSIGNED"
            mv "$UNSIGNED" ai-flashcard.apk
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-flashcard-apk
          path: ai-flashcard.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "AI 智能闪卡 ${{ github.ref_name }}"
          files: ai-flashcard.apk
          generate_release_notes: true
