name: Build APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy HTML to assets
        run: |
          mkdir -p android/app/src/main/assets
          cp flashcard.html android/app/src/main/assets/flashcard.html

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Setup Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          sudo unzip -q gradle-8.7-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH
          /opt/gradle/gradle-8.7/bin/gradle --version

      - name: Build Release APK
        run: |
          cd android
          gradle :app:assembleRelease

      - name: Collect APK
        run: |
          # Find the built APK
          APK=$(find android/app/build/outputs -name "*.apk" | head -1)
          echo "APK: $APK"
          cp "$APK" ai-flashcard.apk

          # Generate debug keystore
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" \
            -noprompt 2>/dev/null || true

          # Sign if unsigned
          UNSIGNED=$(find android/app/build/outputs -name "*-unsigned.apk" | head -1)
          if [ -n "$UNSIGNED" ]; then
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-pass pass:android "$UNSIGNED"
            cp "$UNSIGNED" ai-flashcard.apk
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-flashcard-apk
          path: ai-flashcard.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "AI Flashcard ${{ github.ref_name }}"
          files: ai-flashcard.apk
          generate_release_notes: true
