name: Build APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy HTML to assets
        run: |
          mkdir -p android/app/src/main/assets
          cp flashcard.html android/app/src/main/assets/flashcard.html

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Setup Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          sudo unzip -q gradle-8.7-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH
          /opt/gradle/gradle-8.7/bin/gradle --version

      - name: Build Debug APK
        run: |
          cd android
          gradle :app:assembleDebug

      - name: Collect APK
        run: |
          echo "=== Listing all APK files ==="
          find android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== Directory tree ==="
          find android/app/build/outputs -type f 2>/dev/null | head -30 || echo "No outputs"
          echo "=== Copying APK ==="
          APK=$(find android/app/build/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "Found: $APK"
          cp "$APK" ai-flashcard.apk
          ls -la ai-flashcard.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-flashcard-apk
          path: ai-flashcard.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "AI Flashcard ${{ github.ref_name }}"
          files: ai-flashcard.apk
          generate_release_notes: true

      - name: Sync APK to Gitee Release
        if: startsWith(github.ref, 'refs/tags/') && env.GITEE_TOKEN != ''
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # Create release on Gitee
          RESP=$(curl -s -w "\n%{http_code}" -X POST "https://gitee.com/api/v5/repos/nanchang-university_7_0/flashcard/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"$GITEE_TOKEN\",\"tag_name\":\"${{ github.ref_name }}\",\"name\":\"AI Flashcard ${{ github.ref_name }}\",\"body\":\"自动构建 APK，下载后安装即可\",\"target_commitish\":\"main\"}")
          echo "Response: $RESP"
          # Upload APK
          ID=$(echo "$RESP" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          if [ -n "$ID" ]; then
            echo "Release created, ID=$ID. Uploading APK..."
            curl -s -X POST "https://gitee.com/api/v5/repos/nanchang-university_7_0/flashcard/releases/$ID/attach_files" \
              -F "access_token=$GITEE_TOKEN" \
              -F "file=@ai-flashcard.apk"
            echo "APK uploaded to Gitee release #$ID"
          else
            echo "Failed to create Gitee release. Check token permissions."
          fi
